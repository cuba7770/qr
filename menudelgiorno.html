<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menù Digitale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --colore-testo: #2c3e50; --colore-sfondo: #fdfaf6; --colore-accento: #a04000; }
        body { font-family: 'Lora', serif; background-color: var(--colore-sfondo); color: var(--colore-testo); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        header { margin-bottom: 25px; border-bottom: 2px double var(--colore-accento); padding-bottom: 15px; }
        
        h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: var(--colore-accento); margin: 0; text-transform: uppercase; line-height: 1.1; }
        .tipo-menu { font-size: 1.2rem; letter-spacing: 1px; color: #7f8c8d; text-transform: uppercase; margin-top: 5px; display: block; font-weight: 600; }
        .data-oggi { font-size: 0.95rem; font-weight: 400; margin-top: 15px; color: #95a5a6; border-top: 1px solid #f2f2f2; padding-top: 10px; display: inline-block; }
        
        /* Box INFO (Menu Fisso) rimane a sinistra per i prezzi */
        .box-prezzi { background: #fef9e7; border: 1px dashed #f39c12; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: left; }
        .info-riga { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; }
        .info-desc { font-size: 0.85rem; color: #666; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* SEZIONI E PIATTI CENTRATI */
        .sezione-titolo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--colore-accento); margin: 35px 0 15px 0; border-bottom: 2px solid var(--colore-accento); display: inline-block; text-align: center; }
        .piatto { margin-bottom: 15px; text-align: center; border-bottom: 1px solid #f2f2f2; padding-bottom: 8px; }
        .piatto-nome { font-weight: 600; font-size: 1.1rem; display: block; }
        .piatto-desc { font-size: 0.9rem; color: #95a5a6; display: block; margin: 0 auto; max-width: 80%; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 id="nome-locale">Ristorante</h1>
        <span id="tipo-menu" class="tipo-menu">Menù</span>
        <div id="data-display" class="data-oggi"></div>
    </header>
    <div id="prezzi-menu" class="box-prezzi"></div>
    <div id="lista-piatti"></div>
</div>

<script>
    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8lVR3oa91rUkqbxZxmjBmpKG_6dlSf7EL9R_Ir2EGpx1iz7SjG5B5xK3gKrI3KjoIqePUFl_essZw/pub?output=csv';

    async function caricaMenu() {
        try {
            const response = await fetch(urlCSV);
            const text = await response.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
            const separator = text.includes(';') ? ';' : ',';

            let htmlPrezzi = "";
            let htmlPiatti = "";
            let ultimaSezione = "";
            let dataMenu = "";

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].match(/(".*?"|[^",; \s][^",;]*|(?<=^|,|;)(?=$|,|;))/g) || [];
                const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());
                if (cleanCols.length < 3) continue;

                const rData    = cleanCols[0];
                const rSezione = cleanCols[1] ? cleanCols[1].toUpperCase() : "";
                const rPiatto  = cleanCols[2] || "";
                const rDesc    = cleanCols[3] || "";
                const rPrezzo  = cleanCols[4] || "";

                if (rSezione === "NOME") {
                    document.getElementById('nome-locale').innerText = rPiatto;
                    document.getElementById('tipo-menu').innerText = rDesc;
                    continue;
                }
                if (rData && !dataMenu) dataMenu = rData;

                if (rSezione === "INFO") {
                    htmlPrezzi += `<div class="info-riga"><span>${rPiatto}</span><span>${rPrezzo}</span></div>`;
                    if (rDesc) htmlPrezzi += `<span class="info-desc">${rDesc}</span>`;
                } else if (rPiatto !== "") {
                    if (rSezione !== ultimaSezione) {
                        htmlPiatti += `<div class="sezione-titolo">${rSezione}</div><br>`;
                        ultimaSezione = rSezione;
                    }
                    htmlPiatti += `<div class="piatto"><span class="piatto-nome">${rPiatto}</span>${rDesc ? `<span class="piatto-desc">${rDesc}</span>` : ""}</div>`;
                }
            }
            document.getElementById('data-display').innerText = dataMenu;
            document.getElementById('prezzi-menu').innerHTML = htmlPrezzi;
            document.getElementById('lista-piatti').innerHTML = htmlPiatti;
        } catch (e) { document.getElementById('data-display').innerText = "Errore connessione"; }
    }
    caricaMenu();
</script>
</body>
</html>
