<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menù del Giorno</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --colore-testo: #2c3e50; --colore-sfondo: #fdfaf6; --colore-accento: #a04000; }
        body { font-family: 'Lora', serif; background-color: var(--colore-sfondo); color: var(--colore-testo); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px double var(--colore-accento); padding-bottom: 15px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--colore-accento); margin: 0; text-transform: uppercase; }
        .data-oggi { font-size: 1.1rem; font-weight: 600; margin-top: 10px; color: #7f8c8d; }
        .box-prezzi { background: #fef9e7; border: 1px dashed #f39c12; padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        .info-riga { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; color: #1a252f; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .info-desc { font-size: 0.85rem; color: #666; margin-bottom: 12px; font-style: italic; display: block; }
        .sezione-titolo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--colore-accento); margin: 30px 0 15px 0; border-bottom: 2px solid var(--colore-accento); display: inline-block; }
        .piatto { margin-bottom: 15px; border-bottom: 1px solid #f2f2f2; padding-bottom: 8px; }
        .piatto-nome { font-weight: 600; font-size: 1.1rem; display: block; color: #2c3e50; }
        .piatto-desc { font-size: 0.9rem; color: #95a5a6; display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="nome-ristorante">Menù del Giorno</h1>
        <div id="data-display" class="data-oggi">Sincronizzazione...</div>
    </header>

    <div id="prezzi-menu" class="box-prezzi"></div>
    <div id="lista-piatti"></div>
</div>

<script>
    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQDk1_IUuJnywukysgDUcfc4tQ9jyv2II9ozZ3gcGBiGpkrTCow1PWLrJEabdb_dHiYF5OPGwAuEttN/pub?output=csv';

    async function caricaMenu() {
        try {
            const response = await fetch(urlCSV);
            const text = await response.text();
            const rows = text.split('\n').filter(r => r.trim() !== "");
            const separator = text.includes(';') ? ';' : ',';

            let htmlPrezzi = "";
            let htmlPiatti = "";
            let ultimaSezione = "";
            let dataMenu = "Oggi";

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(separator).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length < 3) continue;

                const rData    = cols[0];
                const rSezione = cols[1].toUpperCase();
                const rPiatto  = cols[2];
                const rDesc    = cols[3] || "";
                const rPrezzo  = cols[4] || ""; // Legge correttamente la colonna E

                if (rData && dataMenu === "Oggi") dataMenu = rData;

                if (rSezione === "INFO") {
                    htmlPrezzi += `<div class="info-riga"><span>${rPiatto}</span><span>${rPrezzo}</span></div>`;
                    if (rDesc) htmlPrezzi += `<span class="info-desc">${rDesc}</span>`;
                } else {
                    if (rSezione !== ultimaSezione) {
                        htmlPiatti += `<div class="sezione-titolo">${rSezione}</div>`;
                        ultimaSezione = rSezione;
                    }
                    htmlPiatti += `<div class="piatto"><span class="piatto-nome">${rPiatto}</span>${rDesc ? `<span class="piatto-desc">${rDesc}</span>` : ""}</div>`;
                }
            }
            document.getElementById('data-display').innerText = dataMenu;
            document.getElementById('prezzi-menu').innerHTML = htmlPrezzi;
            document.getElementById('lista-piatti').innerHTML = htmlPiatti;
        } catch (e) {
            document.getElementById('data-display').innerText = "Errore di caricamento";
        }
    }
    caricaMenu();
</script>
</body>
</html>
