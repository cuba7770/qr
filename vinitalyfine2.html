        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .vinitaly-header { background: #1e1b4b; }
        
        /* Ottimizzazione Mappa: Ingrandimento padiglioni */
        .pavilion { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; transition: all 0.3s ease; cursor: pointer; }
        .pavilion.active { fill: #991b1b !important; stroke: #450a0a; filter: drop-shadow(0 0 10px rgba(153, 27, 27, 0.3)); }
        .pavilion-text { font-size: 12px; font-weight: 900; fill: #1e293b; pointer-events: none; text-transform: uppercase; }
        .pavilion.active + .pavilion-text { fill: #ffffff !important; }
        .region-label { font-size: 8px; fill: #94a3b8; pointer-events: none; font-weight: 600; }

        /* Zoom Mappa su Mobile */
        @media (max-width: 768px) {
            #mapContainer svg { transform: scale(1.3); transform-origin: center; }
            #mapContainer { overflow: hidden; padding: 20px 0; }
        }
        
        /* Card compatte */
        .card { transition: all 0.3s ease; border: 1px solid #f1f5f9; background: white; border-radius: 20px; }
        .card:hover { border-color: #d97706; }
        
        /* WhatsApp Mobile Bar */
        .wa-mobile-bar {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #166534;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 100;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.2);
        }

        /* WhatsApp Desktop Side */
        .side-wa { 
            background: #166534; 
            color: white; 
            writing-mode: vertical-rl; 
            text-orientation: mixed;
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            .wa-mobile-bar { display: block; }
            .side-wa { display: none; }
        }

        ];

        function highlight(h) {
            document.querySelectorAll('.pavilion').forEach(p => p.classList.remove('active'));
            if (!h) return;
            const el = document.querySelector(`#svg-${h.replace(/\s+/g, '-')} .pavilion`);
            if (el) el.classList.add('active');
        }

        window.selectFromMap = (h) => {
            document.getElementById('hallSelect').value = h;
            render();
            document.getElementById('grid').scrollIntoView({behavior:'smooth'});
        };

        window.clickCard = (hallId) => {
            document.getElementById('hallSelect').value = hallId;
            render();
            document.getElementById('mapContainer').scrollIntoView({behavior:'smooth'});
        };

        function render() {
            const rV = document.getElementById('regioneSelect').value;
            const hV = document.getElementById('hallSelect').value;
            const cV = document.getElementById('cantinaSelect').value;
            
            const filtered = exhibitors.filter(e => 
                (!rV || e.r === rV) && (!hV || e.h === hV) && (!cV || e.n === cV)
            );

            highlight(hV || (filtered.length > 0 && filtered.every(f => f.h === filtered[0].h) ? filtered[0].h : null));

            document.getElementById('grid').innerHTML = filtered.map(ex => `
                <div class="card p-3 md:p-6 flex flex-col justify-between cursor-pointer" onclick="clickCard('${ex.h}')">
                    <div>
                        <div class="flex justify-between items-center mb-2 md:mb-4">
                            <span class="text-[7px] md:text-[9px] font-black bg-amber-500 text-black px-2 py-0.5 rounded-full uppercase">${ex.h}</span>
                            <span class="text-[7px] md:text-[9px] font-bold text-slate-400">St. ${ex.p}</span>
                        </div>
                        <h3 class="font-black text-slate-900 text-[10px] md:text-sm uppercase leading-tight mb-1">${ex.n}</h3>
                        <p class="text-amber-700 text-[8px] md:text-[10px] font-bold uppercase">${ex.r}</p>
                    </div>
                    <a href="${ex.l}" target="_blank" onclick="event.stopPropagation()" class="mt-4 block text-center py-2 md:py-3 bg-slate-900 text-white rounded-lg text-[8px] md:text-[10px] font-black uppercase tracking-widest">Link</a>
                </div>
            `).join('');
        }

        function init() {
            const rS = document.getElementById('regioneSelect'), hS = document.getElementById('hallSelect'), cS = document.getElementById('cantinaSelect');
            rS.innerHTML = '<option value="">Regioni</option>';
            hS.innerHTML = '<option value="">Halls</option>';
            cS.innerHTML = '<option value="">Produttore...</option>';

            [...new Set(exhibitors.map(e => e.r))].sort().forEach(r => rS.add(new Option(r, r)));
            [...new Set(exhibitors.map(e => e.h))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})).forEach(h => hS.add(new Option(h, h)));
            exhibitors.sort((a,b)=>a.n.localeCompare(b.n)).forEach(e => cS.add(new Option(e.n, e.n)));

            [rS, hS, cS].forEach(s => s.addEventListener('change', render));
            render();
        }

        window.resetFilters = () => { document.querySelectorAll('select').forEach(s => s.value = ""); render(); };
        init();
    </script>
